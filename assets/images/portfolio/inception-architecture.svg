<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-labelledby="title desc">
  <title id="title">inception architecture</title>
  <desc id="desc">A browser reaches NGINX over HTTPS on port 443. NGINX is the only public entrypoint and forwards requests to WordPress with PHP-FPM. WordPress connects to MariaDB inside a private Docker network. Persistent WordPress site data and MariaDB data are stored in named volumes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#496f5d"/>
    </marker>
  </defs>
  <rect width="1080" height="430" rx="18" fill="#fffaf0"/>
  <g font-family="Quicksand, Arial, sans-serif" fill="#26302b">
    <text x="540" y="42" text-anchor="middle" font-size="28" font-weight="600" fill="#496f5d">inception architecture</text>

    <rect x="250" y="72" width="790" height="286" rx="20" fill="#f1f6ef" stroke="#a9bcae" stroke-width="2"/>
    <text x="276" y="101" font-size="18" font-weight="600" fill="#496f5d">private Docker bridge network · inception</text>

    <g font-size="23" font-weight="600">
      <rect x="34" y="146" width="150" height="78" rx="12" fill="#e7f0e8" stroke="#a9bcae" stroke-width="2"/>
      <text x="109" y="177" text-anchor="middle">browser</text>

      <path d="M194 185 H244" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
      <text x="219" y="171" text-anchor="middle" font-size="16" font-weight="500">HTTPS</text>
      <text x="219" y="216" text-anchor="middle" font-size="16" font-weight="500">443</text>

      <rect x="276" y="146" width="190" height="78" rx="12" fill="#e7f0e8" stroke="#a9bcae" stroke-width="2"/>
      <text x="371" y="177" text-anchor="middle">NGINX</text>
      <text x="371" y="205" text-anchor="middle" font-size="17" font-weight="500">only public entrypoint</text>

      <path d="M466 185 H524" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="536" y="146" width="190" height="78" rx="12" fill="#e7f0e8" stroke="#a9bcae" stroke-width="2"/>
      <text x="631" y="177" text-anchor="middle">WordPress</text>
      <text x="631" y="205" text-anchor="middle" font-size="17" font-weight="500">PHP-FPM</text>

      <path d="M726 185 H784" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="796" y="146" width="210" height="78" rx="12" fill="#e7f0e8" stroke="#a9bcae" stroke-width="2"/>
      <text x="901" y="177" text-anchor="middle">MariaDB</text>
      <text x="901" y="205" text-anchor="middle" font-size="17" font-weight="500">database</text>
    </g>

    <path d="M631 232 V278" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <rect x="470" y="286" width="290" height="48" rx="10" fill="#26302b" opacity="0.92"/>
    <text x="615" y="307" text-anchor="middle" font-size="17" font-weight="600" fill="#fffaf0">persistent site-data volume</text>
    <text x="615" y="326" text-anchor="middle" font-size="14" font-weight="500" fill="#fffaf0">wordpress · /var/www/html/wordpress</text>

    <path d="M901 232 V278" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <rect x="810" y="286" width="220" height="48" rx="10" fill="#26302b" opacity="0.92"/>
    <text x="920" y="307" text-anchor="middle" font-size="16" font-weight="600" fill="#fffaf0">persistent database volume</text>
    <text x="920" y="326" text-anchor="middle" font-size="14" font-weight="500" fill="#fffaf0">mariadb · /var/lib/mysql</text>
  </g>
</svg>
