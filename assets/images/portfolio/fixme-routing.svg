<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="420" viewBox="0 0 1080 420" role="img" aria-labelledby="title desc">
  <title id="title">FIX-like message routing</title>
  <desc id="desc">A Broker sends buy or sell orders to a Market through a central Router. The Router accepts Broker connections on port 5000 and Market connections on port 5001, validates messages and uses a routing table. The Market returns executed or rejected responses through the Router. Connections use non-blocking TCP sockets.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#496f5d"/>
    </marker>
    <marker id="arrow-back" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#496f5d"/>
    </marker>
  </defs>
  <rect width="1080" height="420" rx="18" fill="#fffaf0"/>
  <g font-family="Quicksand, Arial, sans-serif" fill="#26302b">
    <text x="540" y="42" text-anchor="middle" font-size="28" font-weight="600" fill="#496f5d">FIX-like message routing</text>

    <g font-size="25" font-weight="600">
      <rect x="48" y="130" width="190" height="92" rx="12" fill="#e7f0e8" stroke="#a9bcae" stroke-width="2"/>
      <text x="143" y="166" text-anchor="middle">Broker</text>
      <text x="143" y="196" text-anchor="middle" font-size="17" font-weight="500">orders / responses</text>

      <rect x="421" y="102" width="238" height="148" rx="14" fill="#e7f0e8" stroke="#a9bcae" stroke-width="2"/>
      <text x="540" y="139" text-anchor="middle">Router</text>
      <text x="540" y="166" text-anchor="middle" font-size="17" font-weight="500">ports 5000 / 5001</text>
      <rect x="451" y="183" width="178" height="45" rx="9" fill="#26302b" opacity="0.92"/>
      <text x="540" y="202" text-anchor="middle" font-size="15" font-weight="600" fill="#fffaf0">routing table</text>
      <text x="540" y="219" text-anchor="middle" font-size="14" font-weight="500" fill="#fffaf0">validate · dispatch</text>

      <rect x="842" y="130" width="190" height="92" rx="12" fill="#e7f0e8" stroke="#a9bcae" stroke-width="2"/>
      <text x="937" y="166" text-anchor="middle">Market</text>
      <text x="937" y="196" text-anchor="middle" font-size="17" font-weight="500">execute / reject</text>
    </g>

    <path d="M238 158 H409" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="324" y="145" text-anchor="middle" font-size="17" font-weight="600" fill="#496f5d">BUY / SELL</text>
    <text x="324" y="181" text-anchor="middle" font-size="15" font-weight="500">non-blocking TCP · 5000</text>

    <path d="M659 158 H830" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="744" y="145" text-anchor="middle" font-size="17" font-weight="600" fill="#496f5d">forward order</text>
    <text x="744" y="181" text-anchor="middle" font-size="15" font-weight="500">non-blocking TCP · 5001</text>

    <path d="M830 285 H671" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow-back)"/>
    <text x="750" y="272" text-anchor="middle" font-size="17" font-weight="600" fill="#496f5d">EXECUTED / REJECTED</text>

    <path d="M409 285 H250" stroke="#496f5d" stroke-width="3" fill="none" marker-end="url(#arrow-back)"/>
    <text x="329" y="272" text-anchor="middle" font-size="17" font-weight="600" fill="#496f5d">return response</text>

    <rect x="330" y="342" width="420" height="44" rx="10" fill="#26302b" opacity="0.92"/>
    <text x="540" y="370" text-anchor="middle" font-size="18" font-weight="600" fill="#fffaf0">FIX fields · IDs · checksum</text>
  </g>
</svg>
